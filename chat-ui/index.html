<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>nanochat</title>
    <style>
        :root {
            --bg: #F5F0E8;
            --bg-sidebar: #EBE5DB;
            --bg-sidebar-hover: #E0D9CE;
            --bg-sidebar-active: #D8D1C5;
            --bg-input: #ffffff;
            --bg-user: #E8E2D8;
            --text: #2D2A26;
            --text-secondary: #8A8178;
            --text-muted: #B5ADA3;
            --accent: #C75B2A;
            --accent-hover: #B04E22;
            --accent-subtle: #FDF5EF;
            --border: #DDD7CC;
            --tool-bg: #F0EBE3;
            --tool-border: #DDD7CC;
            --tool-result-bg: #EEF7EE;
            --tool-result-text: #2D6A2E;
            --tool-error-bg: #FDF0EF;
            --tool-error-text: #991b1b;
            --metrics: #B5ADA3;
            --button-bg: #2D2A26;
            --button-hover: #C75B2A;
            --radius-sm: 8px;
            --radius-md: 12px;
            --radius-lg: 16px;
            --radius-pill: 999px;
            --font: "Avenir Next", "Avenir", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            --font-display: Georgia, "Times New Roman", "Palatino Linotype", serif;
            --font-mono: "SF Mono", "Cascadia Code", "JetBrains Mono", Menlo, Consolas, monospace;
            --sidebar-w: 260px;
            color-scheme: light;
        }
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { height: 100%; }
        body {
            font-family: var(--font);
            background: var(--bg);
            color: var(--text);
            -webkit-font-smoothing: antialiased;
        }

        /* ===== App Layout ===== */
        .app {
            display: flex;
            height: 100dvh;
            max-height: 100dvh;
            position: relative;
        }

        /* ===== Sidebar ===== */
        .sidebar {
            width: var(--sidebar-w);
            flex-shrink: 0;
            background: var(--bg-sidebar);
            display: flex;
            flex-direction: column;
            border-right: 1px solid var(--border);
            z-index: 100;
        }
        .sidebar-head {
            padding: 1rem 0.75rem;
        }
        .new-chat-btn {
            width: 100%;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.6rem 0.75rem;
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            background: transparent;
            color: var(--text);
            font-family: var(--font);
            font-size: 0.8125rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.15s;
        }
        .new-chat-btn:hover { background: var(--bg-sidebar-hover); border-color: var(--bg-sidebar-active); }
        .new-chat-btn svg { flex-shrink: 0; }
        .sidebar-label {
            padding: 0.75rem 1rem 0.375rem;
            font-size: 0.6875rem;
            font-weight: 600;
            color: var(--text-muted);
            letter-spacing: 0.04em;
            text-transform: uppercase;
        }
        .sidebar-list {
            flex: 1;
            overflow-y: auto;
            padding: 0 0.5rem;
        }
        .sidebar-list::-webkit-scrollbar { width: 4px; }
        .sidebar-list::-webkit-scrollbar-track { background: transparent; }
        .sidebar-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
        .sidebar-item {
            position: relative;
            padding: 0.5rem 0.75rem;
            border-radius: var(--radius-sm);
            cursor: pointer;
            font-size: 0.8125rem;
            color: var(--text-secondary);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            transition: all 0.12s;
            display: flex;
            align-items: center;
            margin-bottom: 1px;
        }
        .sidebar-item:hover { background: var(--bg-sidebar-hover); color: var(--text); }
        .sidebar-item.active { background: var(--bg-sidebar-active); color: var(--text); font-weight: 500; }
        .sidebar-item-title {
            flex: 1;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .sidebar-delete {
            opacity: 0;
            border: none;
            background: none;
            color: var(--text-muted);
            cursor: pointer;
            font-size: 1.125rem;
            line-height: 1;
            padding: 0.125rem 0.25rem;
            border-radius: 4px;
            flex-shrink: 0;
            transition: all 0.12s;
        }
        .sidebar-item:hover .sidebar-delete { opacity: 0.6; }
        .sidebar-delete:hover { opacity: 1 !important; color: var(--tool-error-text); background: var(--tool-error-bg); }
        .sidebar-foot {
            padding: 0.875rem 1rem;
            border-top: 1px solid var(--border);
            font-size: 0.75rem;
            color: var(--text-muted);
            letter-spacing: 0.01em;
        }
        .sidebar-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(45, 42, 38, 0.2);
            z-index: 90;
        }
        .sidebar-overlay.open { display: block; }

        /* ===== Main Area ===== */
        .main {
            flex: 1;
            display: flex;
            flex-direction: column;
            min-width: 0;
            position: relative;
        }

        /* ===== Header ===== */
        .header {
            flex-shrink: 0;
            padding: 0.75rem 1.25rem;
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }
        .menu-btn {
            display: none;
            width: 32px; height: 32px;
            border: none; border-radius: var(--radius-sm);
            background: transparent; color: var(--text-secondary);
            cursor: pointer; align-items: center; justify-content: center;
            font-size: 1.125rem;
            transition: all 0.15s;
        }
        .menu-btn:hover { background: var(--bg-user); }
        .header-brand {
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        .header-brand span {
            font-family: var(--font-display);
            font-size: 1rem;
            font-weight: 400;
            color: var(--text);
            letter-spacing: -0.01em;
        }

        /* ===== Mascot — Nano Spark ===== */
        .mascot { color: var(--accent); display: block; flex-shrink: 0; }
        .header-mascot { width: 28px; height: 28px; }
        .welcome-mascot { width: 72px; height: 72px; }

        .orbit { transform-origin: 24px 24px; }
        .orbit-1 { animation: spin-0 8s linear infinite; }
        .orbit-2 { animation: spin-55 12s linear infinite; }
        .orbit-3 { animation: spin-n40 10s linear infinite; }
        .mascot-core { transform-origin: 24px 24px; animation: core-glow 3s ease-in-out infinite; }
        .mascot-halo { transform-origin: 24px 24px; animation: core-glow 3s ease-in-out infinite 0.5s; }

        .mascot.thinking .orbit-1 { animation-duration: 2s; }
        .mascot.thinking .orbit-2 { animation-duration: 3s; }
        .mascot.thinking .orbit-3 { animation-duration: 2.5s; }
        .mascot.thinking .mascot-core { animation-duration: 0.6s; }
        .mascot.thinking .mascot-halo { animation-duration: 0.6s; }
        .mascot.thinking .electron { animation: electron-grow 0.8s ease-in-out infinite; transform-origin: center; transform-box: fill-box; }

        @keyframes spin-0 { to { transform: rotate(360deg); } }
        @keyframes spin-55 { from { transform: rotate(55deg); } to { transform: rotate(415deg); } }
        @keyframes spin-n40 { from { transform: rotate(-40deg); } to { transform: rotate(320deg); } }
        @keyframes core-glow { 0%,100% { opacity: 0.85; } 50% { opacity: 0.5; } }
        @keyframes electron-grow { 0%,100% { r: inherit; } 50% { transform: scale(1.4); } }

        /* ===== Welcome Screen ===== */
        .welcome {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 2rem 1.5rem;
            gap: 0.5rem;
            animation: fade-in 0.4s ease;
        }
        .welcome-title {
            font-family: var(--font-display);
            font-size: 1.75rem;
            font-weight: 400;
            color: var(--text);
            letter-spacing: -0.015em;
            margin-top: 0.75rem;
        }
        .welcome-sub {
            font-size: 0.875rem;
            color: var(--text-muted);
        }
        .welcome-input {
            width: 100%;
            max-width: 40rem;
            background: var(--bg-input);
            border-radius: var(--radius-lg);
            box-shadow: 0 1px 8px rgba(45,42,38,0.06), 0 4px 20px rgba(45,42,38,0.03);
            padding: 0.625rem;
            display: flex;
            align-items: flex-end;
            gap: 0.5rem;
            margin-top: 1.5rem;
        }
        .suggestions {
            display: flex;
            flex-wrap: wrap;
            gap: 0.5rem;
            justify-content: center;
            margin-top: 1rem;
        }
        .suggestion {
            padding: 0.4375rem 0.875rem;
            border: 1px solid var(--border);
            border-radius: var(--radius-pill);
            background: transparent;
            color: var(--text-secondary);
            font-family: var(--font);
            font-size: 0.8125rem;
            cursor: pointer;
            transition: all 0.15s;
        }
        .suggestion:hover {
            border-color: var(--accent);
            color: var(--accent);
            background: var(--accent-subtle);
        }

        /* ===== Chat Area ===== */
        .chat-area {
            flex: 1;
            overflow-y: auto;
            overflow-x: hidden;
            display: none;
        }
        .chat-area::-webkit-scrollbar { width: 6px; }
        .chat-area::-webkit-scrollbar-track { background: transparent; }
        .chat-area::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
        .messages {
            max-width: 50rem;
            margin: 0 auto;
            padding: 1rem 1.5rem 3rem;
            display: flex;
            flex-direction: column;
            gap: 0.25rem;
        }

        /* ===== Messages ===== */
        .msg { animation: msg-appear 0.25s ease; margin-bottom: 0.375rem; }
        .msg-user { display: flex; justify-content: flex-end; }
        .msg-user-bubble {
            background: var(--bg-user);
            border-radius: var(--radius-lg);
            padding: 0.7rem 1rem;
            max-width: 70%;
            white-space: pre-wrap;
            word-break: break-word;
            line-height: 1.55;
            font-size: 0.9375rem;
            cursor: pointer;
            transition: background 0.15s;
        }
        .msg-user-bubble:hover { background: var(--bg-sidebar-active); }
        .msg-assistant { display: flex; flex-direction: column; align-items: flex-start; }
        .msg-content {
            word-break: break-word;
            line-height: 1.65;
            font-size: 0.9375rem;
            max-width: 100%;
            padding: 0.375rem 0.5rem;
            margin-left: -0.5rem;
            border-radius: var(--radius-sm);
            cursor: pointer;
            transition: background 0.15s;
        }
        .msg-content .text-segment { white-space: pre-wrap; }
        .msg-content:hover { background: var(--bg-user); }
        .msg-system { display: flex; justify-content: flex-start; }
        .msg-system-bubble {
            font-family: var(--font-mono);
            font-size: 0.8125rem;
            background: var(--bg-user);
            padding: 0.5rem 0.75rem;
            border-radius: var(--radius-md);
            color: var(--text-secondary);
            max-width: 80%;
            white-space: pre-wrap;
            line-height: 1.5;
        }

        /* ===== Tool Call ===== */
        .tool-call {
            margin: 0.75rem 0;
            border: 1px solid var(--tool-border);
            border-radius: var(--radius-md);
            overflow: hidden;
            animation: tool-appear 0.2s ease;
            font-size: 0.875rem;
            white-space: normal;
        }
        .tool-hd {
            background: var(--tool-bg);
            padding: 0.375rem 0.75rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            border-bottom: 1px solid var(--tool-border);
            font-size: 0.75rem;
            font-weight: 500;
            color: var(--text-secondary);
            letter-spacing: 0.01em;
        }
        .tool-hd svg { width: 14px; height: 14px; opacity: 0.6; }
        .tool-expr {
            padding: 0.5rem 0.75rem;
            font-family: var(--font-mono);
            color: var(--text);
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        .tool-prefix { color: var(--text-muted); font-weight: 600; flex-shrink: 0; user-select: none; }
        .tool-result {
            padding: 0.5rem 0.75rem;
            font-family: var(--font-mono);
            display: flex;
            align-items: center;
            gap: 0.5rem;
            border-top: 1px solid var(--tool-border);
        }
        .tool-result.success { background: var(--tool-result-bg); color: var(--tool-result-text); }
        .tool-result.success .tool-prefix { color: var(--tool-result-text); opacity: 0.6; }
        .tool-result.error { background: var(--tool-error-bg); color: var(--tool-error-text); }
        .tool-result.error .tool-prefix { color: var(--tool-error-text); opacity: 0.6; }
        .tool-result.pending { color: var(--text-muted); gap: 0.625rem; }
        .tool-spinner {
            width: 14px; height: 14px;
            border: 2px solid var(--border); border-top-color: var(--accent);
            border-radius: 50%; animation: spin 0.6s linear infinite; flex-shrink: 0;
        }

        /* ===== Markdown ===== */
        .msg-content h1,.msg-content h2,.msg-content h3,.msg-content h4,.msg-content h5,.msg-content h6 {
            font-weight: 600; line-height: 1.3; margin: 0.75rem 0 0.25rem;
        }
        .msg-content h1 { font-size: 1.25rem; }
        .msg-content h2 { font-size: 1.125rem; }
        .msg-content h3 { font-size: 1.0625rem; }
        .msg-content h4,.msg-content h5,.msg-content h6 { font-size: 1rem; }
        .msg-content p { margin: 0.25rem 0; }
        .msg-content ul,.msg-content ol { margin: 0.25rem 0; padding-left: 1.5rem; }
        .msg-content li { margin: 0.125rem 0; }
        .msg-content code {
            font-family: var(--font-mono); font-size: 0.85em;
            background: var(--bg-user); padding: 0.125rem 0.375rem; border-radius: 4px;
        }
        .msg-content pre {
            margin: 0.5rem 0; background: var(--bg-user); border-radius: var(--radius-sm);
            padding: 0.75rem 1rem; overflow-x: auto;
        }
        .msg-content pre code { background: none; padding: 0; font-size: 0.8125rem; line-height: 1.5; }
        .msg-content strong { font-weight: 600; }
        .msg-content em { font-style: italic; }

        /* ===== Metrics ===== */
        .msg-metrics {
            font-size: 0.6875rem; color: var(--metrics);
            padding: 0.25rem 0.5rem; margin-left: -0.5rem; margin-top: -0.125rem;
            opacity: 0; animation: fade-in 0.3s ease 0.1s forwards; letter-spacing: 0.01em;
        }

        /* ===== Typing ===== */
        .typing-dots { display: inline-flex; gap: 4px; padding: 0.5rem 0; align-items: center; }
        .typing-dot {
            width: 5px; height: 5px; border-radius: 50%; background: var(--text-muted);
            animation: typing-bounce 1.4s ease-in-out infinite;
        }
        .typing-dot:nth-child(2) { animation-delay: 0.16s; }
        .typing-dot:nth-child(3) { animation-delay: 0.32s; }

        /* ===== Input Area ===== */
        .input-area {
            flex-shrink: 0;
            padding: 0.75rem 1.5rem;
            padding-bottom: calc(0.75rem + env(safe-area-inset-bottom));
            display: none;
        }
        .input-wrap {
            max-width: 50rem;
            margin: 0 auto;
            background: var(--bg-input);
            border-radius: var(--radius-lg);
            box-shadow: 0 1px 8px rgba(45,42,38,0.06), 0 4px 20px rgba(45,42,38,0.03);
            padding: 0.625rem;
            display: flex;
            align-items: flex-end;
            gap: 0.5rem;
        }
        .chat-textarea {
            flex: 1;
            padding: 0.5rem 0.625rem;
            border: none;
            background: transparent;
            color: var(--text);
            font-family: var(--font);
            font-size: 0.9375rem;
            line-height: 1.5;
            resize: none;
            outline: none;
            min-height: 40px;
            max-height: 200px;
        }
        .chat-textarea::placeholder { color: var(--text-muted); }
        .send-btn {
            flex-shrink: 0;
            width: 36px; height: 36px;
            border: none; border-radius: 50%;
            background: var(--button-bg); color: #fff;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; transition: all 0.15s;
        }
        .send-btn:hover:not(:disabled) { background: var(--button-hover); }
        .send-btn:disabled { background: var(--border); color: var(--text-muted); cursor: not-allowed; }

        /* ===== Error ===== */
        .error-banner {
            background: var(--tool-error-bg); border: 1px solid #fecaca; color: var(--tool-error-text);
            padding: 0.625rem 0.875rem; border-radius: var(--radius-md); font-size: 0.875rem;
            margin-bottom: 0.5rem; animation: msg-appear 0.25s ease;
        }

        /* ===== Animations ===== */
        @keyframes fade-in { from { opacity: 0; } to { opacity: 1; } }
        @keyframes msg-appear { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes tool-appear { from { opacity: 0; transform: scale(0.98); } to { opacity: 1; transform: scale(1); } }
        @keyframes typing-bounce { 0%,60%,100% { transform: translateY(0); opacity: 0.3; } 30% { transform: translateY(-4px); opacity: 1; } }
        @keyframes spin { to { transform: rotate(360deg); } }
        @keyframes result-flash { from { background: #c6f6d5; } }

        /* ===== Mobile ===== */
        @media (max-width: 768px) {
            .sidebar {
                position: fixed; left: calc(-1 * var(--sidebar-w) - 20px);
                top: 0; bottom: 0; z-index: 100;
                transition: left 0.25s ease; box-shadow: none;
            }
            .sidebar.open { left: 0; box-shadow: 4px 0 24px rgba(45,42,38,0.12); }
            .menu-btn { display: flex !important; }
            .messages { padding: 1rem 1rem 2rem; }
            .input-area { padding: 0.625rem 0.75rem; padding-bottom: calc(0.625rem + env(safe-area-inset-bottom)); }
            .welcome-input { max-width: 100%; }
            .msg-user-bubble { max-width: 85%; }
            .suggestions { gap: 0.375rem; }
            .suggestion { font-size: 0.75rem; padding: 0.375rem 0.75rem; }
        }
    </style>
</head>
<body>
    <div class="app">
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-head">
                <button class="new-chat-btn" id="newChatBtn">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M12 5v14M5 12h14"/></svg>
                    New chat
                </button>
            </div>
            <div class="sidebar-label" id="sidebarLabel" style="display:none">Recents</div>
            <div class="sidebar-list" id="sidebarList"></div>
            <div class="sidebar-foot">nanochat &middot; 1.6B parameters</div>
        </aside>
        <div class="sidebar-overlay" id="sidebarOverlay"></div>

        <div class="main">
            <header class="header">
                <button class="menu-btn" id="menuBtn">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M3 12h18M3 6h18M3 18h18"/></svg>
                </button>
                <div class="header-brand">
                    <svg class="mascot header-mascot" viewBox="0 0 48 48" fill="none">
                        <circle class="mascot-halo" cx="24" cy="24" r="8" fill="currentColor" opacity="0.06"/>
                        <circle class="mascot-core" cx="24" cy="24" r="3.5" fill="currentColor" opacity="0.85"/>
                        <circle cx="24" cy="24" r="5.5" fill="currentColor" opacity="0.1"/>
                        <g class="orbit orbit-1"><ellipse cx="24" cy="24" rx="18" ry="7" fill="none" stroke="currentColor" stroke-width="0.7" opacity="0.35"/><circle class="electron" cx="42" cy="24" r="1.8" fill="currentColor" opacity="0.7"/></g>
                        <g class="orbit orbit-2"><ellipse cx="24" cy="24" rx="15" ry="6.5" fill="none" stroke="currentColor" stroke-width="0.7" opacity="0.28"/><circle class="electron" cx="39" cy="24" r="1.5" fill="currentColor" opacity="0.6"/></g>
                        <g class="orbit orbit-3"><ellipse cx="24" cy="24" rx="13" ry="5.5" fill="none" stroke="currentColor" stroke-width="0.7" opacity="0.22"/><circle class="electron" cx="37" cy="24" r="1.3" fill="currentColor" opacity="0.5"/></g>
                    </svg>
                    <span>nanochat</span>
                </div>
            </header>

            <div class="welcome" id="welcome">
                <svg class="mascot welcome-mascot" viewBox="0 0 48 48" fill="none">
                    <circle class="mascot-halo" cx="24" cy="24" r="10" fill="currentColor" opacity="0.06"/>
                    <circle class="mascot-core" cx="24" cy="24" r="3.5" fill="currentColor" opacity="0.85"/>
                    <circle cx="24" cy="24" r="5.5" fill="currentColor" opacity="0.1"/>
                    <g class="orbit orbit-1"><ellipse cx="24" cy="24" rx="18" ry="7" fill="none" stroke="currentColor" stroke-width="0.7" opacity="0.35"/><circle class="electron" cx="42" cy="24" r="1.8" fill="currentColor" opacity="0.7"/></g>
                    <g class="orbit orbit-2"><ellipse cx="24" cy="24" rx="15" ry="6.5" fill="none" stroke="currentColor" stroke-width="0.7" opacity="0.28"/><circle class="electron" cx="39" cy="24" r="1.5" fill="currentColor" opacity="0.6"/></g>
                    <g class="orbit orbit-3"><ellipse cx="24" cy="24" rx="13" ry="5.5" fill="none" stroke="currentColor" stroke-width="0.7" opacity="0.22"/><circle class="electron" cx="37" cy="24" r="1.3" fill="currentColor" opacity="0.5"/></g>
                </svg>
                <div class="welcome-title">nanochat</div>
                <div class="welcome-sub">1.6B parameter language model</div>
                <div class="welcome-input">
                    <textarea class="chat-textarea" id="welcomeInput" placeholder="Message nanochat..." rows="1"></textarea>
                    <button class="send-btn" id="welcomeSendBtn" disabled>
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 19V5M5 12l7-7 7 7"/></svg>
                    </button>
                </div>
                <div class="suggestions">
                    <button class="suggestion" data-prompt="What is 234 times 567?">What is 234 &times; 567?</button>
                    <button class="suggestion" data-prompt="Tell me about black holes">Tell me about black holes</button>
                    <button class="suggestion" data-prompt="Write a haiku about coding">Write a haiku about coding</button>
                </div>
            </div>

            <main class="chat-area" id="chatArea">
                <div class="messages" id="messagesEl"></div>
            </main>

            <footer class="input-area" id="inputArea">
                <div class="input-wrap">
                    <textarea class="chat-textarea" id="chatInput" placeholder="Message nanochat..." rows="1"></textarea>
                    <button class="send-btn" id="chatSendBtn" disabled>
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 19V5M5 12l7-7 7 7"/></svg>
                    </button>
                </div>
            </footer>
        </div>
    </div>

    <script>
    (() => {
        const API_BASE = window.location.protocol === 'file:' ? 'http://localhost:8888' : '';

        // ===== State =====
        let messages = [];
        let isGenerating = false;
        let temperature = 0.8;
        let topK = 50;
        let userScrolledUp = false;
        let activeConvoId = null;
        let isWelcomeState = true;

        // ===== DOM =====
        const sidebar = document.getElementById('sidebar');
        const sidebarList = document.getElementById('sidebarList');
        const sidebarLabel = document.getElementById('sidebarLabel');
        const sidebarOverlay = document.getElementById('sidebarOverlay');
        const welcome = document.getElementById('welcome');
        const chatArea = document.getElementById('chatArea');
        const messagesEl = document.getElementById('messagesEl');
        const inputArea = document.getElementById('inputArea');
        const welcomeInput = document.getElementById('welcomeInput');
        const welcomeSendBtn = document.getElementById('welcomeSendBtn');
        const chatInput = document.getElementById('chatInput');
        const chatSendBtn = document.getElementById('chatSendBtn');

        const calcIcon = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="4" y="2" width="16" height="20" rx="2"/><line x1="8" y1="6" x2="16" y2="6"/><line x1="8" y1="10" x2="16" y2="10"/><line x1="8" y1="14" x2="8" y2="14.01"/><line x1="12" y1="14" x2="12" y2="14.01"/><line x1="16" y1="14" x2="16" y2="14.01"/><line x1="8" y1="18" x2="8" y2="18.01"/><line x1="12" y1="18" x2="12" y2="18.01"/><line x1="16" y1="18" x2="16" y2="18.01"/></svg>`;
        const toolNames = { python: 'Calculator' };
        function getToolName(t) { return toolNames[t] || t; }

        // ===== localStorage =====
        const STORAGE_KEY = 'nanochat_conversations';
        const ACTIVE_KEY = 'nanochat_active_id';

        function genId() { return Date.now().toString(36) + Math.random().toString(36).slice(2, 8); }
        function loadConvos() { try { return JSON.parse(localStorage.getItem(STORAGE_KEY)) || []; } catch { return []; } }
        function saveConvos(c) { localStorage.setItem(STORAGE_KEY, JSON.stringify(c)); }
        function getActiveId() { return localStorage.getItem(ACTIVE_KEY); }
        function setActiveIdLS(id) { if (id) localStorage.setItem(ACTIVE_KEY, id); else localStorage.removeItem(ACTIVE_KEY); }

        function saveCurrentConvo() {
            if (!activeConvoId || messages.length === 0) return;
            const convos = loadConvos();
            const idx = convos.findIndex(c => c.id === activeConvoId);
            const firstUser = messages.find(m => m.role === 'user');
            const convo = {
                id: activeConvoId,
                title: firstUser ? firstUser.content.slice(0, 50) : 'New conversation',
                messages,
                createdAt: idx >= 0 ? convos[idx].createdAt : Date.now(),
                updatedAt: Date.now()
            };
            if (idx >= 0) convos[idx] = convo; else convos.unshift(convo);
            saveConvos(convos);
            renderSidebar();
        }

        function deleteConvo(id) {
            saveConvos(loadConvos().filter(c => c.id !== id));
            if (activeConvoId === id) { activeConvoId = null; setActiveIdLS(null); newConversation(); }
            renderSidebar();
        }

        function loadConvo(id) {
            const convo = loadConvos().find(c => c.id === id);
            if (!convo) return;
            messages = [...convo.messages];
            activeConvoId = id;
            setActiveIdLS(id);
            renderLoadedConvo();
            renderSidebar();
            closeSidebar();
        }

        function escHtml(s) { return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

        function renderSidebar() {
            const convos = loadConvos().sort((a, b) => b.updatedAt - a.updatedAt);
            sidebarLabel.style.display = convos.length ? '' : 'none';
            sidebarList.innerHTML = '';
            convos.forEach(c => {
                const el = document.createElement('div');
                el.className = 'sidebar-item' + (c.id === activeConvoId ? ' active' : '');
                const title = document.createElement('span');
                title.className = 'sidebar-item-title';
                title.textContent = c.title;
                title.addEventListener('click', () => loadConvo(c.id));
                const del = document.createElement('button');
                del.className = 'sidebar-delete';
                del.textContent = '\u00d7';
                del.title = 'Delete';
                del.addEventListener('click', (e) => { e.stopPropagation(); deleteConvo(c.id); });
                el.appendChild(title);
                el.appendChild(del);
                sidebarList.appendChild(el);
            });
        }

        // ===== Sidebar mobile =====
        function toggleSidebar() { sidebar.classList.toggle('open'); sidebarOverlay.classList.toggle('open'); }
        function closeSidebar() { sidebar.classList.remove('open'); sidebarOverlay.classList.remove('open'); }
        document.getElementById('menuBtn').addEventListener('click', toggleSidebar);
        sidebarOverlay.addEventListener('click', closeSidebar);

        // ===== UI State =====
        function showWelcome() {
            isWelcomeState = true;
            welcome.style.display = 'flex';
            chatArea.style.display = 'none';
            inputArea.style.display = 'none';
            welcomeInput.focus();
        }
        function showConversation() {
            isWelcomeState = false;
            welcome.style.display = 'none';
            chatArea.style.display = 'flex';
            inputArea.style.display = 'block';
            chatInput.focus();
        }

        // ===== Mascot =====
        function setThinking(on) {
            document.querySelectorAll('.mascot').forEach(m => m.classList.toggle('thinking', on));
        }

        // ===== Scroll =====
        chatArea.addEventListener('scroll', () => {
            const { scrollTop, scrollHeight, clientHeight } = chatArea;
            userScrolledUp = scrollHeight - scrollTop - clientHeight > 60;
        });
        function autoScroll() { if (!userScrolledUp) chatArea.scrollTop = chatArea.scrollHeight; }

        // ===== Markdown =====
        function renderMarkdown(text) {
            const esc = s => s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
            const lines = text.split('\n');
            let html = '', inCode = false, codeLines = [], inList = false, listType = '';
            function closeList() { if (inList) { html += listType === 'ul' ? '</ul>' : '</ol>'; inList = false; } }
            for (const line of lines) {
                if (line.trimStart().startsWith('```')) {
                    if (!inCode) { closeList(); inCode = true; codeLines = []; }
                    else { html += `<pre><code>${esc(codeLines.join('\n'))}</code></pre>`; inCode = false; }
                    continue;
                }
                if (inCode) { codeLines.push(line); continue; }
                if (line.trim() === '') { closeList(); html += '\n'; continue; }
                const hm = line.match(/^(#{1,6})\s+(.+)$/);
                if (hm) { closeList(); html += `<h${hm[1].length}>${inlineMd(esc(hm[2]))}</h${hm[1].length}>`; continue; }
                const ul = line.match(/^(\s*)[-*]\s+(.+)$/);
                if (ul) { if (!inList || listType !== 'ul') { closeList(); html += '<ul>'; inList = true; listType = 'ul'; } html += `<li>${inlineMd(esc(ul[2]))}</li>`; continue; }
                const ol = line.match(/^(\s*)\d+\.\s+(.+)$/);
                if (ol) { if (!inList || listType !== 'ol') { closeList(); html += '<ol>'; inList = true; listType = 'ol'; } html += `<li>${inlineMd(esc(ol[2]))}</li>`; continue; }
                closeList();
                html += `<p>${inlineMd(esc(line))}</p>`;
            }
            if (inCode) html += `<pre><code>${esc(codeLines.join('\n'))}</code></pre>`;
            closeList();
            return html;
        }
        function inlineMd(t) {
            return t.replace(/`([^`]+)`/g,'<code>$1</code>').replace(/\*\*([^*]+)\*\*/g,'<strong>$1</strong>').replace(/\*([^*]+)\*/g,'<em>$1</em>');
        }

        // ===== Message Rendering =====
        function addUserMessage(text, idx) {
            const msg = document.createElement('div'); msg.className = 'msg msg-user';
            const bubble = document.createElement('div'); bubble.className = 'msg-user-bubble';
            bubble.textContent = text; bubble.title = 'Click to edit'; bubble.dataset.idx = idx;
            bubble.addEventListener('click', () => { if (!isGenerating) editMessage(idx); });
            msg.appendChild(bubble); messagesEl.appendChild(msg); autoScroll();
        }
        function addSystemMessage(text) {
            const msg = document.createElement('div'); msg.className = 'msg msg-system';
            const bubble = document.createElement('div'); bubble.className = 'msg-system-bubble';
            bubble.textContent = text; msg.appendChild(bubble); messagesEl.appendChild(msg); autoScroll();
        }
        function addErrorBanner(text) {
            const el = document.createElement('div'); el.className = 'error-banner';
            el.textContent = text; messagesEl.appendChild(el); autoScroll();
        }

        // ===== Stream Context =====
        function createStreamCtx() {
            const msg = document.createElement('div'); msg.className = 'msg msg-assistant';
            const content = document.createElement('div'); content.className = 'msg-content';
            msg.appendChild(content); messagesEl.appendChild(msg);
            const typingEl = document.createElement('div'); typingEl.className = 'typing-dots';
            typingEl.innerHTML = '<div class="typing-dot"></div><div class="typing-dot"></div><div class="typing-dot"></div>';
            content.appendChild(typingEl);
            let currentSpan = null, currentToolBox = null, fullText = '', typingRemoved = false;
            function removeTyping() { if (!typingRemoved && typingEl.parentNode) { typingEl.remove(); typingRemoved = true; } }
            function ensureSpan() { if (!currentSpan) { currentSpan = document.createElement('span'); currentSpan.className = 'text-segment'; content.appendChild(currentSpan); } return currentSpan; }

            return {
                el: msg, contentEl: content,
                appendText(t) { removeTyping(); fullText += t; ensureSpan().textContent += t; autoScroll(); },
                toolStart(tool) {
                    removeTyping(); currentSpan = null;
                    currentToolBox = document.createElement('div'); currentToolBox.className = 'tool-call';
                    const hd = document.createElement('div'); hd.className = 'tool-hd'; hd.innerHTML = calcIcon;
                    const label = document.createElement('span'); label.textContent = getToolName(tool); hd.appendChild(label);
                    currentToolBox.appendChild(hd);
                    const expr = document.createElement('div'); expr.className = 'tool-expr';
                    expr.appendChild(Object.assign(document.createElement('div'), { className: 'tool-spinner' }));
                    currentToolBox.appendChild(expr);
                    content.appendChild(currentToolBox); autoScroll();
                },
                toolCall(expression) {
                    if (!currentToolBox) return;
                    const expr = currentToolBox.querySelector('.tool-expr'); expr.innerHTML = '';
                    const pfx = document.createElement('span'); pfx.className = 'tool-prefix'; pfx.textContent = '>';
                    expr.appendChild(pfx); expr.appendChild(document.createTextNode(' ' + expression));
                    const res = document.createElement('div'); res.className = 'tool-result pending';
                    res.appendChild(Object.assign(document.createElement('div'), { className: 'tool-spinner' }));
                    const pt = document.createElement('span'); pt.textContent = 'Computing...'; res.appendChild(pt);
                    currentToolBox.appendChild(res); autoScroll();
                },
                toolResult(result, error) {
                    if (!currentToolBox) return;
                    const el = currentToolBox.querySelector('.tool-result'); if (!el) return;
                    if (error || result === null || result === undefined) {
                        el.className = 'tool-result error'; el.innerHTML = '';
                        const p = document.createElement('span'); p.className = 'tool-prefix'; p.textContent = '!';
                        el.appendChild(p); el.appendChild(document.createTextNode(' ' + (error || 'No result')));
                    } else {
                        el.className = 'tool-result success'; el.innerHTML = ''; el.style.animation = 'result-flash 0.4s ease';
                        const p = document.createElement('span'); p.className = 'tool-prefix'; p.textContent = '=';
                        el.appendChild(p); el.appendChild(document.createTextNode(' ' + result));
                    }
                    currentToolBox = null; currentSpan = null; autoScroll();
                },
                showMetrics(m) {
                    if (!m) return;
                    const tps = m.elapsed_ms > 0 ? (m.total_tokens / (m.elapsed_ms / 1000)).toFixed(1) : '0';
                    const el = document.createElement('div'); el.className = 'msg-metrics';
                    el.textContent = `${tps} tok/s  \u00b7  ${(m.elapsed_ms / 1000).toFixed(1)}s  \u00b7  TTFT ${m.ttft_ms ?? '--'}ms`;
                    msg.appendChild(el);
                },
                finalize(idx) {
                    removeTyping();
                    content.querySelectorAll('.text-segment').forEach(s => {
                        if (s.textContent.trim()) {
                            const w = document.createElement('div'); w.className = 'md-segment';
                            w.innerHTML = renderMarkdown(s.textContent); s.replaceWith(w);
                        }
                    });
                    content.title = 'Click to regenerate'; content.dataset.idx = idx;
                    content.addEventListener('click', () => { if (!isGenerating) regenerateMessage(idx); });
                    return fullText;
                }
            };
        }

        // ===== SSE Streaming =====
        async function generateResponse() {
            isGenerating = true; chatSendBtn.disabled = true; welcomeSendBtn.disabled = true;
            setThinking(true); userScrolledUp = false;
            const ctx = createStreamCtx();
            try {
                const response = await fetch(API_BASE + '/chat/completions', {
                    method: 'POST', headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ messages, temperature, top_k: topK, max_tokens: 512 })
                });
                if (!response.ok) throw new Error(`Server error: ${response.status}`);
                const reader = response.body.getReader();
                const decoder = new TextDecoder();
                let buffer = '';
                while (true) {
                    const { done, value } = await reader.read();
                    if (done) break;
                    buffer += decoder.decode(value, { stream: true });
                    const lines = buffer.split('\n'); buffer = lines.pop();
                    for (const line of lines) {
                        if (!line.startsWith('data: ')) continue;
                        let d; try { d = JSON.parse(line.slice(6)); } catch { continue; }
                        if (d.token !== undefined) ctx.appendText(d.token);
                        else if (d.type === 'tool_start') ctx.toolStart(d.tool);
                        else if (d.type === 'tool_call') ctx.toolCall(d.expression);
                        else if (d.type === 'tool_result') ctx.toolResult(d.result, d.error);
                        else if (d.done) ctx.showMetrics(d.metrics);
                    }
                }
                const idx = messages.length;
                const fullText = ctx.finalize(idx);
                messages.push({ role: 'assistant', content: fullText });
                saveCurrentConvo();
            } catch (err) {
                ctx.contentEl.innerHTML = '';
                const e = document.createElement('div'); e.className = 'error-banner';
                e.textContent = 'Error: ' + err.message; ctx.contentEl.appendChild(e);
            } finally {
                isGenerating = false; setThinking(false);
                chatSendBtn.disabled = !chatInput.value.trim();
                welcomeSendBtn.disabled = !welcomeInput.value.trim();
            }
        }

        // ===== Edit & Regenerate =====
        function editMessage(idx) {
            if (idx < 0 || idx >= messages.length || messages[idx].role !== 'user') return;
            chatInput.value = messages[idx].content;
            chatInput.style.height = 'auto';
            chatInput.style.height = Math.min(chatInput.scrollHeight, 200) + 'px';
            chatSendBtn.disabled = false;
            messages = messages.slice(0, idx);
            const all = messagesEl.querySelectorAll('.msg');
            for (let i = idx; i < all.length; i++) all[i].remove();
            saveCurrentConvo();
            chatInput.focus();
        }
        function regenerateMessage(idx) {
            if (idx < 0 || idx >= messages.length || messages[idx].role !== 'assistant') return;
            messages = messages.slice(0, idx);
            const all = messagesEl.querySelectorAll('.msg');
            for (let i = idx; i < all.length; i++) all[i].remove();
            saveCurrentConvo();
            generateResponse();
        }

        // ===== Slash Commands =====
        function handleSlashCommand(text) {
            const [cmd, arg] = text.trim().split(/\s+/);
            const c = cmd.toLowerCase();
            if (c === '/temperature') {
                if (!arg) { addSystemMessage('Temperature: ' + temperature); }
                else { const v = parseFloat(arg); if (isNaN(v)||v<0||v>2) addSystemMessage('Invalid. 0.0\u20132.0'); else { temperature = v; addSystemMessage('Temperature: ' + v); } }
                return true;
            }
            if (c === '/topk') {
                if (!arg) { addSystemMessage('Top-k: ' + topK); }
                else { const v = parseInt(arg); if (isNaN(v)||v<1||v>200) addSystemMessage('Invalid. 1\u2013200'); else { topK = v; addSystemMessage('Top-k: ' + v); } }
                return true;
            }
            if (c === '/clear') { newConversation(); return true; }
            if (c === '/help') {
                addSystemMessage('/temperature [v]  \u2014  Get/set (0.0\u20132.0)\n/topk [v]         \u2014  Get/set (1\u2013200)\n/clear              \u2014  New conversation\n/help               \u2014  This help');
                return true;
            }
            return false;
        }

        // ===== New Conversation =====
        function newConversation() {
            messages = [];
            activeConvoId = null;
            setActiveIdLS(null);
            messagesEl.innerHTML = '';
            showWelcome();
            isGenerating = false;
            setThinking(false);
            renderSidebar();
            closeSidebar();
        }

        // ===== Load saved conversation =====
        function renderLoadedConvo() {
            showConversation();
            messagesEl.innerHTML = '';
            messages.forEach((m, i) => {
                if (m.role === 'user') {
                    addUserMessage(m.content, i);
                } else if (m.role === 'assistant') {
                    const msg = document.createElement('div'); msg.className = 'msg msg-assistant';
                    const content = document.createElement('div'); content.className = 'msg-content';
                    const md = document.createElement('div'); md.className = 'md-segment';
                    md.innerHTML = renderMarkdown(m.content); content.appendChild(md);
                    content.title = 'Click to regenerate'; content.dataset.idx = i;
                    content.addEventListener('click', () => { if (!isGenerating) regenerateMessage(i); });
                    msg.appendChild(content); messagesEl.appendChild(msg);
                }
            });
            autoScroll();
        }

        // ===== Send =====
        async function sendMessage() {
            const activeInput = isWelcomeState ? welcomeInput : chatInput;
            const text = activeInput.value.trim();
            if (!text || isGenerating) return;

            if (text.startsWith('/')) {
                activeInput.value = ''; activeInput.style.height = 'auto';
                if (isWelcomeState && text === '/clear') return;
                if (!isWelcomeState) handleSlashCommand(text);
                return;
            }

            activeInput.value = ''; activeInput.style.height = 'auto';
            if (isWelcomeState) showConversation();
            if (!activeConvoId) { activeConvoId = genId(); setActiveIdLS(activeConvoId); }

            const idx = messages.length;
            messages.push({ role: 'user', content: text });
            addUserMessage(text, idx);
            saveCurrentConvo();
            await generateResponse();
        }

        function useSuggestion(text) { if (isGenerating) return; welcomeInput.value = text; sendMessage(); }

        // ===== Input Setup =====
        function setupInput(ta, btn) {
            ta.addEventListener('input', () => {
                ta.style.height = 'auto';
                ta.style.height = Math.min(ta.scrollHeight, 200) + 'px';
                btn.disabled = !ta.value.trim() || isGenerating;
            });
            ta.addEventListener('keydown', (e) => { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); } });
            btn.addEventListener('click', sendMessage);
        }
        setupInput(welcomeInput, welcomeSendBtn);
        setupInput(chatInput, chatSendBtn);

        // ===== Global Keys =====
        document.getElementById('newChatBtn').addEventListener('click', () => { if (!isGenerating) newConversation(); });
        document.addEventListener('keydown', (e) => {
            if (e.ctrlKey && e.shiftKey && e.key === 'N') { e.preventDefault(); if (!isGenerating) newConversation(); }
        });
        document.querySelectorAll('.suggestion').forEach(b => {
            b.addEventListener('click', () => useSuggestion(b.dataset.prompt));
        });

        // ===== Init =====
        renderSidebar();
        const savedId = getActiveId();
        if (savedId) {
            const convo = loadConvos().find(c => c.id === savedId);
            if (convo && convo.messages.length > 0) { loadConvo(savedId); }
            else { welcomeInput.focus(); welcomeSendBtn.disabled = false; }
        } else {
            welcomeInput.focus(); welcomeSendBtn.disabled = false;
        }

        fetch(API_BASE + '/health').then(r => r.json())
            .then(d => { if (!d.ready) { showConversation(); addErrorBanner('Model is loading...'); } })
            .catch(() => {});
    })();
    </script>
</body>
